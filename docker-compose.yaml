# nginx proxy address - http://172.17.0.1:3004

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  tldraw:
    image: tldraw/tldraw:latest
    container_name: tldraw-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - tldraw
    ports:
      - "3004:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    volumes:
      - ./volumes/config/tldraw:/config
      - ./volumes/data/tldraw:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tldraw:
    external: false
