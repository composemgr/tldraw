# nginx proxy address - http://172.17.0.1:3004

name: tldraw
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  tldraw:
    image: foxxmd/tldraw:latest
    pull_policy: always
    container_name: tldraw-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - tldraw
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:3004:5858"
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: tldraw-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/tldraw:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5858"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://tldraw-app:5858'
      - 'cloudflare.hostname=tldraw.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.tldraw-app.entrypoints=http'
      - 'traefik.http.routers.tldraw-app-secure.tls=true'
      - 'traefik.http.routers.tldraw-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.tldraw-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.tldraw-app.middlewares=tldraw-app-https-redirect'
      - 'traefik.http.routers.tldraw-app-secure.entrypoints=https'
      - 'traefik.http.routers.tldraw-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.tldraw-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.tldraw-app-secure.service=tldraw-app'
      - 'traefik.http.services.tldraw-app.loadbalancer.server.port=5858'

networks:
  tldraw:
    name: tldraw
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
